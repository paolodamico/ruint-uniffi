# Copy the types you need into your own uniffi.toml. Without this, your
# types will be lowered as `String`s which is not what you want.
#
# Kotlin: maps to java.math.BigInteger
# Swift:  maps to BigUInt from attaswift/BigInt (add `imports = ["BigInt"]`)


###### U128 ######

[bindings.kotlin.custom_types.Uint128]
type_name = "java.math.BigInteger"
lift = "java.math.BigInteger({}, 16)"
lower = "{}.toString(16)"

[bindings.swift.custom_types.Uint128]
type_name = "BigUInt"
lift = "BigUInt({}, radix: 16)!"
lower = "String({}, radix: 16)"
imports = ["BigInt"]

